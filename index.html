<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Snake - Nokia verze</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: Arial, sans-serif; }
        canvas { background: #000; display: block; margin: 30px auto; border: 2px solid #0f0; }
        h1 { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Snake - Nokia verze</h1>
    <canvas id="game" width="400" height="400"></canvas>
    <p>Ovládání: šipky na klávesnici</p>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{x: 10, y: 10}];
        let direction = {x: 0, y: 0};
        let food = {x: 5, y: 5};
        let tail = 3;
        let gameOver = false;
        let score = 0;

        function resetGame() {
            snake = [{x: 10, y: 10}];
            direction = {x: 0, y: 0};
            food = {x: 5, y: 5};
            tail = 3;
            gameOver = false;
            score = 0;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = '#f00';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

            // Draw snake
            ctx.fillStyle = '#0f0';
            for (let s of snake) {
                ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize, gridSize);
            }

            // Draw score
            ctx.fillStyle = '#fff';
            ctx.font = '18px Arial';
            ctx.fillText('Skóre: ' + score, 10, 390);
        }

        function update() {
            if (gameOver) return;
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Game over if out of bounds
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver = true;
                setTimeout(() => alert('Konec hry! Skóre: ' + score), 100);
                return;
            }

            // Game over if snake eats itself
            for (let s of snake) {
                if (s.x === head.x && s.y === head.y) {
                    gameOver = true;
                    setTimeout(() => alert('Konec hry! Skóre: ' + score), 100);
                    return;
                }
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                tail++;
                score++;
                placeFood();
            }
            while (snake.length > tail) snake.pop();
        }

        function placeFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(s => s.x === newFood.x && s.y === newFood.y));
            food = newFood;
        }

        document.addEventListener('keydown', e => {
            if (gameOver && e.key.startsWith('Arrow')) {
                resetGame();
                return;
            }
            switch (e.key) {
                case 'ArrowLeft':
                    if (direction.x !== 1) direction = {x: -1, y: 0};
                    break;
                case 'ArrowUp':
                    if (direction.y !== 1) direction = {x: 0, y: -1};
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) direction = {x: 1, y: 0};
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) direction = {x: 0, y: 1};
                    break;
            }
        });

        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, 100);
        }

        gameLoop();
    </script>
</body>
</html>
