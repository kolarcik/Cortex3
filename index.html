<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Tetris</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        #tetris {
            background: #111;
            margin: 30px auto;
            display: block;
            border: 2px solid #fff;
        }
        #score { font-size: 1.2em; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Tetris</h1>
    <canvas id="tetris" width="240" height="400"></canvas>
    <div id="score">Skóre: 0</div>
    <script>
        // Nastavení
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(24, 24); // 10x20 políček

        const ROWS = 20;
        const COLS = 10;
        const arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));

        // Tetris tvary
        const SHAPES = [
            [[1,1,1,1]], // I
            [[2,2],[2,2]], // O
            [[0,3,0],[3,3,3]], // T
            [[0,4,4],[4,4,0]], // S
            [[5,5,0],[0,5,5]], // Z
            [[6,0,0],[6,6,6]], // J
            [[0,0,7],[7,7,7]]  // L
        ];

        function randomShape() {
            const id = Math.floor(Math.random() * SHAPES.length);
            return {matrix: SHAPES[id].map(row => [...row]), id: id+1};
        }

        let player = {
            pos: {x: 3, y: 0},
            matrix: null,
            id: 0,
            score: 0
        };

        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate() {
            const pos = player.pos.x;
            rotate(player.matrix);
            let offset = 1;
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix);
                    rotate(player.matrix);
                    rotate(player.matrix);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const shape = randomShape();
            player.matrix = shape.matrix;
            player.id = shape.id;
            player.pos.y = 0;
            player.pos.x = Math.floor(COLS / 2) - Math.floor(player.matrix[0].length / 2);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                if (arena[y].every(v => v !== 0)) {
                    arena.splice(y, 1);
                    arena.unshift(Array(COLS).fill(0));
                    player.score += rowCount * 10;
                    rowCount *= 2;
                    y++;
                }
            }
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        context.fillStyle = COLORS[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.strokeStyle = '#222';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#111';
            context.fillRect(0, 0, COLS, ROWS);
            drawMatrix(arena, {x:0, y:0});
            drawMatrix(player.matrix, player.pos);
        }

        function updateScore() {
            document.getElementById('score').innerText = 'Skóre: ' + player.score;
        }

        let dropCounter = 0;
        let dropInterval = 600;
        let lastTime = 0;

        function update(time = 0) {
            const delta = time - lastTime;
            lastTime = time;
            dropCounter += delta;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') playerMove(-1);
            else if (e.key === 'ArrowRight') playerMove(1);
            else if (e.key === 'ArrowDown') playerDrop();
            else if (e.key === 'ArrowUp') playerRotate();
        });

        const COLORS = [
            '#000', // background
            '#00ffff', // I - tyrkysová
            '#ffff00', // O - žlutá
            '#800080', // T - fialová
            '#00ff00', // S - zelená
            '#ff0000', // Z - červená
            '#0000ff', // J - modrá
            '#ff8000'  // L - oranžová
        ];

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
