name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'
      - name: Restore
        run: dotnet restore src/ScoreApi
      - name: Build
        run: dotnet build --no-restore src/ScoreApi -c Release
      - name: Test
        run: dotnet test tests/ScoreApi.Tests --no-build -c Release --verbosity normal
